version: "3"

tasks:
  dev:
    desc: ローカル開発サーバー起動（クライアント自動ビルド + Worker）
    deps:
      - dev:client
      - dev:worker

  dev:client:
    desc: Vite でクライアントをウォッチビルド
    cmds:
      - bunx vite build --watch

  dev:worker:
    desc: Wrangler 開発サーバー起動
    cmds:
      - bunx wrangler dev --live-reload

  build:
    desc: プロダクションビルド
    cmds:
      - bunx vite build
      - bunx wrangler deploy --dry-run

  check:
    desc: 型チェック + lint
    cmds:
      - bunx tsc --noEmit
      - bunx biome check .

  format:
    desc: コード整形
    cmds:
      - bunx biome format --write .
