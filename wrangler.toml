name = "kit"
main = "src/server/index.ts"
compatibility_date = "2025-12-01"

[assets]
directory = "dist/client"
binding = "ASSETS"
not_found_handling = "single-page-application"
run_worker_first = true

routes = [
  { pattern = "kit.ich.sh", custom_domain = true },
]

[observability]
enabled = true
